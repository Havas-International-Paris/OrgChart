name: Supabase keep-alive

# Supabase free-tier projects pause after a week without API activity.
# This weekly ping is a lightweight authenticated-free request that counts
# as activity, so the project never pauses. Requires two repo secrets:
#   SUPABASE_URL       - Project URL (Project Settings -> API)
#   SUPABASE_ANON_KEY  - Publishable/anon key (same page)

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/employees?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
